<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokopia Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #e8f5e0;
      --bg2:       #d4edca;
      --surface:   #ffffff;
      --card:      #ffffff;
      --card-hover:#f0fae8;
      --border:    #b8dfa0;
      --border2:   #c8e8b0;

      --green:     #5cc832;
      --green-dark:#3a9918;
      --green-bg:  #e0f5d0;

      --yellow:    #ffd93d;
      --yellow-dk: #e6b800;
      --orange:    #ff8c42;
      --purple:    #a855f7;
      --blue:      #38bdf8;
      --red:       #f43f5e;
      --pink:      #ec4899;

      --text:      #2d4a1e;
      --text2:     #4a7a30;
      --muted:     #7aaa55;
      --white:     #ffffff;

      --shadow-sm: 0 2px 8px rgba(60,120,30,.12);
      --shadow-md: 0 4px 20px rgba(60,120,30,.15);
      --shadow-lg: 0 8px 32px rgba(60,120,30,.2);

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,217,61,.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(92,200,50,.2) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(168,85,247,.06) 0%, transparent 60%);
    }

    /* ════════════════════════════════
       ÉCRAN DE CONNEXION
    ════════════════════════════════ */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }

    .login-logo {
      width: min(320px, 80vw);
      filter: drop-shadow(0 6px 20px rgba(92,200,50,.3));
      animation: floatLogo 3s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .login-card {
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: var(--shadow-lg), 0 0 0 6px rgba(92,200,50,.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      max-width: 380px;
      width: 100%;
    }
    .login-card p {
      color: var(--text2);
      font-size: 1rem;
      font-weight: 700;
    }

    .btn-google {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .85rem 2rem;
      background: var(--white);
      color: #333;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-lg);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 3px 12px rgba(0,0,0,.1);
    }
    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.15);
      border-color: #bbb;
    }
    .btn-google svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* ════════════════════════════════
       APP
    ════════════════════════════════ */
    #app { display: none; }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 3px solid var(--border);
      padding: 1rem 1.5rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }
    .header-logo {
      height: 56px;
      filter: drop-shadow(0 2px 8px rgba(92,200,50,.25));
    }
    .user-bar {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .85rem;
      color: var(--text2);
      font-weight: 700;
    }
    .user-bar img {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--green);
    }
    .btn-logout {
      background: none;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-family: inherit;
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .7rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* PROGRESS */
    .progress-wrap {
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding-top: 30px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      font-weight: 800;
      color: var(--text2);
      margin-bottom: .4rem;
    }
    .progress-meta .count-found { color: var(--green-dark); font-size: 1rem; }
    .progress-bar {
      height: 14px;
      background: var(--bg2);
      border-radius: 99px;
      overflow: hidden;
      border: 2px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green) 0%, #a3e635 100%);
      border-radius: 99px;
      transition: width .6s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.3) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* CONTROLS */
    .controls {
      max-width: 960px;
      margin: 1.25rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      align-items: center;
    }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-wrap svg {
      position: absolute; left: .9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    input[type="search"] {
      width: 100%;
      padding: .65rem 1rem .65rem 2.4rem;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: var(--shadow-sm);
    }
    input[type="search"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(92,200,50,.15);
    }
    input[type="search"]::placeholder { color: var(--muted); font-weight: 600; }

    select {
      padding: .65rem 1rem;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: border-color .2s;
    }
    select:focus { border-color: var(--green); }

    .btn-group { display: flex; gap: .4rem; }
    .btn-filter {
      padding: .6rem 1.1rem;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      background: var(--white);
      color: var(--muted);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
    }
    .btn-filter:hover { border-color: var(--green); color: var(--green-dark); }
    .btn-filter.active {
      background: var(--green);
      border-color: var(--green-dark);
      color: var(--white);
      box-shadow: 0 3px 10px rgba(92,200,50,.35);
    }

    /* STATS BAR */
    .stats-bar {
      max-width: 960px;
      margin: 0 auto .75rem;
      padding: 0 1.5rem;
      display: flex;
      gap: .5rem;
      font-size: .8rem;
      font-weight: 800;
      color: var(--text2);
    }
    .stat-chip {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 99px;
      padding: .2rem .7rem;
      box-shadow: var(--shadow-sm);
    }
    .stat-chip.found-chip { border-color: var(--green); color: var(--green-dark); }

    /* GRID */
    .grid {
      max-width: 960px;
      margin: 0 auto 3rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 1rem;
    }

    /* CARD */
    .card {
      background: var(--white);
      border: 2.5px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 1rem .9rem .9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .45rem;
      cursor: pointer;
      position: relative;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), border-color .18s, box-shadow .18s;
      user-select: none;
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
      box-shadow: var(--shadow-sm);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.85) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: var(--green);
      box-shadow: var(--shadow-md), 0 0 0 3px rgba(92,200,50,.12);
    }
    .card.found {
      border-color: var(--green);
      background: linear-gradient(160deg, #f0fde8 0%, #e0f8d0 100%);
      box-shadow: var(--shadow-sm), 0 0 0 3px rgba(92,200,50,.15);
    }
    .card.found::after {
      content: '✓';
      position: absolute;
      top: .55rem; right: .6rem;
      width: 22px; height: 22px;
      background: var(--green);
      color: white;
      border-radius: 50%;
      font-size: .75rem;
      font-weight: 900;
      line-height: 22px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(92,200,50,.4);
    }

    .card-img {
      width: 72px; height: 72px;
      image-rendering: pixelated;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.15));
    }
    .card:hover .card-img { transform: scale(1.15) translateY(-2px); }
    .card.found .card-img { filter: drop-shadow(0 3px 8px rgba(92,200,50,.35)); }

    .card-id {
      font-size: .65rem;
      color: var(--muted);
      font-weight: 800;
      position: absolute;
      top: .55rem; left: .65rem;
      background: var(--bg2);
      border-radius: 6px;
      padding: .1rem .3rem;
    }
    .card.found .card-id { background: rgba(92,200,50,.15); color: var(--green-dark); }

    .card-name {
      font-size: .88rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      color: var(--text);
      font-family: 'Fredoka', cursive;
      font-size: .95rem;
    }
    .card.found .card-name { color: var(--green-dark); }

    .card-pills { display: flex; flex-direction: column; gap: .2rem; width: 100%; }
    .pill {
      font-size: .62rem;
      font-weight: 800;
      padding: .15rem .4rem;
      border-radius: 6px;
      background: var(--bg2);
      color: var(--text2);
      text-align: center;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid var(--border);
    }
    .pill.mat {
      background: rgba(255,217,61,.2);
      color: #7a5c00;
      border-color: rgba(255,217,61,.5);
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty span { font-size: 3.5rem; display: block; margin-bottom: .75rem; }
    .empty p { font-weight: 700; font-size: 1rem; }

    /* ════════════════════════════════
       MODAL
    ════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(30,60,15,.5);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      overflow: hidden;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg);
      border: 3px solid var(--border);
      border-radius: var(--radius-xl);
      width: min(500px, calc(100vw - 2rem));
      max-height: min(90vh, 700px);
      overflow-y: auto;
      overflow-x: hidden;
      transform: translateY(24px) scale(.95);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      position: relative;
      scrollbar-width: none;
      box-shadow: var(--shadow-lg), 0 0 0 6px rgba(92,200,50,.1);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal::-webkit-scrollbar { display: none; }

    .modal-close {
      position: absolute;
      top: .9rem; right: .9rem;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      transition: all .2s;
      z-index: 10;
      font-weight: 900;
      box-shadow: var(--shadow-sm);
    }
    .modal-close:hover { border-color: var(--red); color: var(--red); transform: rotate(90deg); }

    /* Modal Hero */
    .modal-hero {
      background: linear-gradient(160deg, #d4f0b8 0%, #b8e890 100%);
      border-radius: calc(var(--radius-xl) - 3px) calc(var(--radius-xl) - 3px) 0 0;
      padding: 1.25rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      border-bottom: 3px solid var(--border);
      position: relative;
      overflow: visible;
    }
    .modal-hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,217,61,.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,140,66,.2) 0%, transparent 50%);
      pointer-events: none;
    }
    /* Petits ronds décoratifs inspirés du logo */
    .modal-hero::after {
      content: '●  ●  ●';
      position: absolute;
      bottom: .5rem;
      font-size: .4rem;
      color: rgba(92,200,50,.4);
      letter-spacing: .5rem;
    }
    .modal-hero.found-hero {
      background: linear-gradient(160deg, #c0f0a0 0%, #90e060 100%);
    }

    .modal-sprite {
      width: 100px; height: 100px;
      image-rendering: pixelated;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,.2));
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      position: relative;
      z-index: 1;
    }
    .modal-sprite:hover { transform: scale(1.08) translateY(-4px); }

    .modal-num {
      font-size: .75rem;
      color: var(--green-dark);
      font-weight: 900;
      background: rgba(255,255,255,.5);
      border-radius: 99px;
      padding: .15rem .6rem;
      letter-spacing: .05em;
    }
    .modal-name {
      font-family: 'Fredoka', cursive;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 2px 4px rgba(255,255,255,.5);
      position: relative; z-index: 1;
    }
    .modal-hero.found-hero .modal-name { color: var(--green-dark); }

    /* Modal Body */
    .modal-body {
      padding: 1.25rem 1.5rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      min-width: 0;
      width: 100%;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 99px;
    }

    /* Spécialités */
    .mat-list { display: flex; flex-wrap: wrap; gap: .4rem; }
    .mat-badge {
      background: rgba(255,217,61,.2);
      border: 2px solid rgba(255,217,61,.5);
      color: #7a5c00;
      border-radius: var(--radius-sm);
      padding: .3rem .75rem .3rem .4rem;
      font-size: .82rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .mat-badge-icon {
      width: 22px; height: 22px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* Habitat card */
    .habitat-card {
      background: var(--white);
      border: 2px solid var(--border2);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: .65rem;
      box-shadow: var(--shadow-sm);
      transition: border-color .2s;
      width: 100%;
      min-width: 0;
    }
    .habitat-card:last-child { margin-bottom: 0; }
    .habitat-card:hover { border-color: var(--green); }

    .habitat-header {
      display: flex;
      gap: .75rem;
      align-items: center;
      padding: .8rem;
    }
    .habitat-thumb {
      width: 68px; height: 68px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .habitat-thumb-placeholder {
      width: 68px; height: 68px;
      border-radius: var(--radius-sm);
      background: var(--bg2);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .habitat-info { flex: 1; min-width: 0; }
    .habitat-name {
      font-size: .92rem;
      font-weight: 900;
      color: var(--text);
      font-family: 'Fredoka', cursive;
      margin-bottom: .2rem;
    }
    .habitat-ressources {
      font-size: .75rem;
      color: var(--text2);
      font-weight: 700;
      line-height: 1.4;
    }
    .habitat-ressources strong { color: var(--green-dark); }

    /* Habitat meta */
    .habitat-meta {
      padding: .55rem .8rem;
      border-top: 2px solid var(--border2);
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      align-items: center;
      background: var(--bg2);
    }
    .meta-group { display: flex; align-items: center; gap: .3rem; }
    .meta-label {
      font-size: .62rem;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .meta-icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      object-fit: contain;
      border: none;
      background: none;
    }

    .rarete-stars { display: flex; gap: 2px; }
    .star { font-size: .9rem; line-height: 1; }
    .star.filled { color: var(--yellow); text-shadow: 0 1px 3px rgba(255,217,61,.5); }
    .star.empty-star { color: var(--border); }

    .zone-badge {
      background: rgba(56,189,248,.15);
      border: 1.5px solid rgba(56,189,248,.4);
      border-radius: 99px;
      padding: .15rem .55rem;
      font-size: .72rem;
      font-weight: 800;
      color: #0369a1;
    }

    /* Bouton trouvé */
    .btn-found {
      width: 100%;
      padding: 1rem;
      border-radius: var(--radius-lg);
      border: 3px solid var(--border);
      background: var(--white);
      color: var(--muted);
      font-family: 'Fredoka', cursive;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      box-shadow: var(--shadow-sm);
    }
    .btn-found:hover {
      border-color: var(--green);
      color: var(--green-dark);
      background: var(--green-bg);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .btn-found.is-found {
      border-color: var(--green);
      background: linear-gradient(135deg, #d4f5b8, #a8e878);
      color: var(--green-dark);
      box-shadow: 0 4px 16px rgba(92,200,50,.3);
    }
    .btn-found.is-found:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(244,63,94,.06);
    }
    .btn-found-icon { font-size: 1.3rem; }

    /* STATUS */
    .firebase-status {
      position: fixed;
      bottom: 1rem; right: 1rem;
      font-size: .75rem;
      font-weight: 800;
      padding: .4rem .9rem;
      border-radius: var(--radius-md);
      background: var(--white);
      border: 2px solid var(--border);
      color: var(--muted);
      transition: all .3s;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .firebase-status.saving { color: var(--orange); border-color: var(--orange); }
    .firebase-status.saved  { color: var(--green-dark); border-color: var(--green); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--white);
      border: 2.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: .65rem 1.4rem;

    .toast.found-toast   { border-color: var(--green);  color: var(--green-dark); }
    .toast.unfound-toast { border-color: var(--red);    color: var(--red); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .75rem; padding: 0 1rem; }
      .controls { padding: 0 1rem; gap: .5rem; }
      .filter-row { gap: .5rem; }
      #filter-mat    { flex: 1; min-width: 120px; font-size: .82rem; padding: .55rem .7rem; }
      #filter-zone   { flex: 1; min-width: 110px; font-size: .82rem; padding: .55rem .7rem; }
      #filter-habitat{ flex: 1 1 100%; min-width: 110px; font-size: .82rem; padding: .55rem .7rem; }
      header { padding: .75rem 1rem 1rem; }
      .header-logo { height: 44px; }
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal {
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        max-height: 85vh;
        max-width: 100vw;
        width: 100%;
      }
      .modal-hero { padding: 1rem; }
      .modal-body { padding: 1rem 1rem 1.5rem; }
      .modal-sprite { width: 80px; height: 80px; }
      .modal-name { font-size: 1.4rem; }
      input[type="search"] { font-size: .85rem; }
      .header-inner { flex-direction: column; justify-content: inherit;}
    }

    /* LANGUE SWITCH */
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 99px;
      padding: 3px;
      box-shadow: var(--shadow-sm);
    }
    .lang-btn {
      padding: .25rem .7rem;
      border-radius: 99px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Fredoka', cursive;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .lang-btn.active {
      background: var(--white);
      color: var(--green-dark);
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(60,120,30,.15);
    }
    .lang-btn:hover:not(.active) { color: var(--text2); }

    /* ── POPUP COMPTE ── */
    .signup-overlay {
      position: fixed; inset: 0;
      background: rgba(30,60,15,.55);
      backdrop-filter: blur(5px);
      z-index: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .signup-overlay.open { opacity: 1; pointer-events: all; }
    .signup-card {
      background: var(--white);
      border: 3px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem 2rem 1.75rem;
      max-width: 380px; width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg), 0 0 0 6px rgba(92,200,50,.1);
      transform: scale(.93) translateY(16px);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .signup-overlay.open .signup-card { transform: scale(1) translateY(0); }
    .signup-emoji { font-size: 2.5rem; display: block; margin-bottom: .75rem; }
    .signup-title {
      font-family: 'Fredoka', cursive;
      font-size: 1.4rem; font-weight: 700;
      color: var(--text); margin-bottom: .5rem;
    }
    .signup-text {
      font-size: .9rem; color: var(--text2);
      font-weight: 700; line-height: 1.5;
      margin-bottom: 1.25rem;
    }
    .signup-text strong { color: var(--green-dark); }
    .btn-signup-google {
      display: flex; align-items: center; justify-content: center;
      gap: .7rem; width: 100%;
      padding: .85rem 1.5rem;
      background: var(--white); color: #333;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-lg);
      font-family: 'Nunito', sans-serif;

    .btn-signup-google:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .btn-signup-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .btn-skip {
      background: none; border: none;
      color: var(--muted); font-family: inherit;

    .signup-progress {
      font-size: .75rem; color: var(--muted);
      font-weight: 700; margin-bottom: 1rem;
    }
    /* User bar — masquer avatar/nom si non connecté */

    .user-bar.guest #user-name { display: none; }
    .btn-login-header {
      background: var(--green);
      border: none; border-radius: var(--radius-md);
      color: white; font-family: 'Fredoka', cursive;
      font-size: .9rem; font-weight: 600;
      padding: .3rem .9rem; cursor: pointer;

    }
    .btn-login-header:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(92,200,50,.4); }
    .btn-login-header.hidden { display: none; }
  </style>
</head>

        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>

<script src="./translations.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyAdAEH70nYgctJ5XG1ZupblZvZiHKucQes",
    authDomain:        "pokopia-6d442.firebaseapp.com",
    projectId:         "pokopia-6d442",
    storageBucket:     "pokopia-6d442.firebasestorage.app",
    messagingSenderId: "605118786868",
    appId:             "1:605118786868:web:a40b08683b23ba729a4961"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  let pokemons = [], progress = {}, currentUser = null;
  let filterStatus = 'all', filterMat = '', filterZone = '', filterHabitat = '', searchQuery = '', saveTimer = null;
  let lang = 'fr';

  // ── HELPERS TRADUCTION ──
  const TR = window.POKOPIA_TRANSLATIONS;
  function tSpec(fr)     { return lang === 'en' ? (TR.specialites[fr]  || fr) : fr; }
  function tHabitat(fr)  { return lang === 'en' ? (TR.habitats[fr]     || fr) : fr; }
  function tZone(fr)     { return lang === 'en' ? (TR.zones[fr]        || fr) : fr; }
  function tRarete(fr)   { return lang === 'en' ? (TR.rarete[fr]       || fr) : fr; }
  function tRessource(fr){ return lang === 'en' ? TR.translateRessource(fr)   : fr; }

  const T = {
    fr: {
      search_placeholder:"Chercher un Pokémon…", all_specialities:"Toutes les spécialités",
      all_zones:"Toutes les zones", all_habitats:"Tous les habitats",
      btn_all:"Tous", btn_found:"✓ Trouvés", btn_missing:"✗ Manquants",
      found_count:"Trouvés", logout:"Déconnexion",
      specialities_title:"⚙️ Spécialités", habitats_title:"🏕️ Habitats",
      resources:"Ressources :", schedule:"Horaires", weather:"Météo",
      rarity:"Rareté", zone:"Zone",
      mark_found:"Marquer comme trouvé", mark_unfound:"Trouvé ! (cliquer pour annuler)",
      no_results:"Aucun Pokémon trouvé…", no_speciality:"Aucune spécialité", no_habitat:"Aucun habitat connu",
      toast_found:(n)=>`✅ ${n} trouvé !`, toast_removed:(n)=>`❌ ${n} retiré`,
    },
    en: {
      search_placeholder:"Search a Pokémon…", all_specialities:"All specialities",
      all_zones:"All zones", all_habitats:"All habitats",
      btn_all:"All", btn_found:"✓ Found", btn_missing:"✗ Missing",
      found_count:"Found", logout:"Logout",
      specialities_title:"⚙️ Specialities", habitats_title:"🏕️ Habitats",
      resources:"Resources:", schedule:"Schedule", weather:"Weather",
      rarity:"Rarity", zone:"Zone",
      mark_found:"Mark as found", mark_unfound:"Found! (click to undo)",
      no_results:"No Pokémon found…", no_speciality:"No speciality", no_habitat:"No known habitat",
      toast_found:(n)=>`✅ ${n} found!`, toast_removed:(n)=>`❌ ${n} removed`,
    }
  };

  function applyLang() {
    const t = T[lang];
    document.getElementById('search').placeholder             = t.search_placeholder;
    document.getElementById('filter-mat').options[0].text     = t.all_specialities;
    document.getElementById('filter-zone').options[0].text    = t.all_zones;
    document.getElementById('filter-habitat').options[0].text = t.all_habitats;
    document.getElementById('btn-logout').textContent         = t.logout;
    document.querySelector('[data-status="all"]').textContent    = t.btn_all;
    document.querySelector('[data-status="found"]').textContent  = t.btn_found;
    document.querySelector('[data-status="missing"]').textContent= t.btn_missing;
    const fl = document.getElementById('found-label');
    if (fl) fl.textContent = t.found_count;
    const ts = document.getElementById('title-specialities');
    const th = document.getElementById('title-habitats');
    if (ts) ts.textContent = t.specialities_title;
    if (th) th.textContent = t.habitats_title;
    ['filter-mat','filter-zone','filter-habitat'].forEach(id => {
      Array.from(document.getElementById(id).options).forEach((o,i) => {
        if (!i) return;
        const fr = o.getAttribute('data-fr') || o.value;
        if (id==='filter-mat')     o.textContent = tSpec(fr);
        if (id==='filter-zone')    o.textContent = tZone(fr);
        if (id==='filter-habitat') o.textContent = tHabitat(fr);
      });
    });
    document.documentElement.lang = lang;
  }
  let modalPokemonId = null;

  // AUTH

  const LS_KEY = 'pokopia_progress';
  const POPUP_THRESHOLD = 10; // Premier popup
  const POPUP_REPEAT    = 5;  // Popup récurrent
  let popupShown = false;

  // ── LocalStorage helpers ──
  function loadFromLocal() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
  }
  function saveToLocal(data) {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }

  // ── Connexion Google (depuis popup ou header) ──
  async function doLogin() {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) { console.error(e); }
  }

  document.getElementById('btn-login-header').addEventListener('click', doLogin);
  document.getElementById('btn-signup-google').addEventListener('click', doLogin);
  document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
  document.getElementById('btn-skip').addEventListener('click', () => {
    closeSignupPopup();
  });

  // ── Popup ──
  function showSignupPopup() {
    const count = Object.values(progress).filter(Boolean).length;
    const isFirst = count === POPUP_THRESHOLD;
    // On met à jour le innerHTML en une seule fois (évite le problème de signup-count manquant)
    if (isFirst) {
      document.getElementById('signup-title').textContent = lang === 'en'
        ? 'Save your progress!' : 'Sauvegardez votre progression !';
      document.getElementById('signup-text').innerHTML = lang === 'en'
        ? `You've already found <strong>${count}</strong> Pokémon!<br>Create a free account to never lose your progress, even if you change device.`
        : `Vous avez déjà trouvé <strong>${count}</strong> Pokémon !<br>Créez un compte gratuit pour ne jamais perdre votre avancée, même si vous changez d'appareil.`;
      document.getElementById('signup-btn-text').textContent = lang === 'en'
        ? 'Create account with Google' : 'Créer un compte avec Google';
    } else {
      document.getElementById('signup-title').textContent = lang === 'en'
        ? 'Still going strong!' : 'Toujours plus loin !';
      document.getElementById('signup-text').innerHTML = lang === 'en'
        ? `<strong>${count}</strong> Pokémon found! Your progress is only saved locally.<br>Sign in to back it up to the cloud for free.`
        : `<strong>${count}</strong> Pokémon trouvés ! Votre progression n'est sauvegardée que localement.<br>Connectez-vous pour la sauvegarder dans le cloud gratuitement.`;
      document.getElementById('signup-btn-text').textContent = lang === 'en'
        ? 'Sign in with Google' : 'Se connecter avec Google';
    }
    document.getElementById('signup-overlay').classList.add('open');
  }
  function closeSignupPopup() {
    document.getElementById('signup-overlay').classList.remove('open');
  }
  document.getElementById('signup-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('signup-overlay')) closeSignupPopup();
  });

  // ── Vérifier si on doit montrer le popup (invité seulement) ──
  function checkPopup() {
    if (currentUser) return; // connecté → jamais de popup
    const count = Object.values(progress).filter(Boolean).length;
    if (count === POPUP_THRESHOLD) {
      showSignupPopup();
    } else if (count > POPUP_THRESHOLD && (count - POPUP_THRESHOLD) % POPUP_REPEAT === 0) {
      showSignupPopup();
    }
  }

  // ── Auth state ──
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      closeSignupPopup();
      // Fusion : localStorage → Firestore
      const local = loadFromLocal();
      // Charger Firestore
      try {
        const snap = await getDoc(doc(db, 'progress', user.uid));
        const remote = snap.exists() ? (snap.data().found || {}) : {};
        // Merge : union des deux (local + remote)
        progress = { ...remote, ...local };
        await setDoc(doc(db, 'progress', user.uid), { found: progress });
        localStorage.removeItem(LS_KEY); // nettoyage
      } catch(e) {
        progress = local;
        console.warn(e);
      }
      // Mettre à jour UI header
      document.getElementById('user-name').textContent = user.displayName;
      document.getElementById('user-avatar').src = user.photoURL || '';
      document.getElementById('btn-login-header').classList.add('hidden');
      document.getElementById('btn-logout').classList.remove('hidden');
      document.getElementById('user-avatar').style.display = 'block';
      document.getElementById('user-name').style.display = 'block';
      document.querySelector('.user-bar').classList.remove('guest');
      setStatus('saved');
      if (!pokemons.length) await loadData();
      else { render(); updateProgress(); }
    } else {
      currentUser = null;
      progress = loadFromLocal();
      // Header mode invité
      document.getElementById('btn-login-header').classList.remove('hidden');
      document.getElementById('btn-logout').classList.add('hidden');
      document.querySelector('.user-bar').classList.add('guest');
      setStatus('local');
      if (!pokemons.length) await loadData();
      else { render(); updateProgress(); }
    }
  });

  async function loadData() {
    if (!pokemons.length) {
      const res = await fetch('./pokemon.json');
      pokemons = await res.json();
      const allMats = [...new Set(pokemons.flatMap(p => p.materiaux || []))].sort();
      const sel = document.getElementById('filter-mat');
      while (sel.options.length > 1) sel.remove(1);
      allMats.forEach(m => { const o = document.createElement('option'); o.value=m; o.textContent=m; o.setAttribute('data-fr', m); sel.appendChild(o); });

      // Zones
      const allZones = [...new Set(
        pokemons.flatMap(p => (p.habitats || [])
          .filter(h => typeof h === 'object' && h.zones)
          .flatMap(h => h.zones.split(',').map(z => z.trim()))
        )
      )].sort((a, b) => {
        // "Toutes" en dernier
        if (a === 'Toutes') return 1;
        if (b === 'Toutes') return -1;
        return a.localeCompare(b, 'fr');
      });
      const selZone = document.getElementById('filter-zone');
      while (selZone.options.length > 1) selZone.remove(1);
      allZones.forEach(z => { const o = document.createElement('option'); o.value=z; o.textContent=z; o.setAttribute('data-fr', z); selZone.appendChild(o); });

      // Habitats
      const allHabitats = [...new Set(
        pokemons.flatMap(p => (p.habitats || [])
          .filter(h => typeof h === 'object' && h.nom)
          .map(h => h.nom)
        )
      )].sort((a, b) => a.localeCompare(b, 'fr'));
      const selHab = document.getElementById('filter-habitat');
      while (selHab.options.length > 1) selHab.remove(1);
      allHabitats.forEach(h => { const o = document.createElement('option'); o.value=h; o.textContent=h; o.setAttribute('data-fr', h); selHab.appendChild(o); });

      document.getElementById('total').textContent = pokemons.length;
    }
    await loadProgress();
    render();
  }

  async function loadProgress() {
    if (!currentUser) {
      progress = loadFromLocal();
      setStatus('local');
      return;
    }
    setStatus('saving');
    try {
      const snap = await getDoc(doc(db, 'progress', currentUser.uid));
      progress = snap.exists() ? (snap.data().found || {}) : {};
      setStatus('saved');
    } catch(e) { console.warn(e); setStatus(''); }
  }

  function saveProgress() {
    if (!currentUser) {
      // Invité → localStorage
      saveToLocal(progress);
      setStatus('local');
      checkPopup();
      return;
    }
    // Connecté → Firestore
    saveToLocal(progress); // backup local aussi
    clearTimeout(saveTimer);
    setStatus('saving');
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(doc(db, 'progress', currentUser.uid), { found: progress });
        setStatus('saved');
      } catch(e) { console.warn(e); setStatus(''); }
    }, 800);
  }

  function setStatus(s) {
    const el = document.getElementById('fb-status');
    el.className = 'firebase-status ' + s;
    el.textContent = s==='saving' ? '⏳ Sauvegarde…' : s==='saved' ? '☁️ Sauvegardé' : s==='local' ? '💾 Local' : '⚠️ Erreur';
  }

  function toggleFound(id) {
    const key = String(id);
    progress[key] = !progress[key];
    if (!progress[key]) delete progress[key];
    saveProgress();
    updateProgress();
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      const found = !!progress[key];
      card.classList.toggle('found', found);
      if (filterStatus === 'found'   && !found) card.style.display = 'none';
      if (filterStatus === 'missing' &&  found) card.style.display = 'none';
    }
    if (modalPokemonId === id) updateModalFoundState(id);
    const p = pokemons.find(p => p.id === id);
    showToast(p?.nom || '', !!progress[key]);
  }

  function render() {
    const grid = document.getElementById('grid');
    const q = searchQuery.toLowerCase();
    const filtered = pokemons.filter(p => {
      if (q && !p.nom.toLowerCase().includes(q)) return false;
      if (filterMat && !(p.materiaux || []).includes(filterMat)) return false;
      // Filtre zone
      if (filterZone) {
        const hasZone = (p.habitats || []).some(h =>
          typeof h === 'object' && h.zones &&
          h.zones.split(',').map(z => z.trim()).includes(filterZone)
        );
        if (!hasZone) return false;
      }
      // Filtre habitat
      if (filterHabitat) {
        const hasHab = (p.habitats || []).some(h =>
          typeof h === 'object' && h.nom === filterHabitat
        );
        if (!hasHab) return false;
      }
      const found = !!progress[String(p.id)];
      if (filterStatus === 'found'   && !found) return false;
      if (filterStatus === 'missing' &&  found) return false;
      return true;
    });
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty"><span>🔍</span><p>${T[lang].no_results}</p></div>`;
      updateProgress(); return;
    }
    grid.innerHTML = filtered.map((p, i) => {
      const found   = !!progress[String(p.id)];
      const firstHab = p.habitats?.[0];
      const habNom   = tHabitat(firstHab?.nom || (typeof firstHab === 'string' ? firstHab : ''));
      const firstMat = tSpec((p.materiaux || [])[0] || '');
      const displayName = lang === 'en' ? (p.nom_en || p.nom) : p.nom;
      return `<div class="card ${found?'found':''}" data-id="${p.id}"
        style="animation-delay:${Math.min(i*18,500)}ms" onclick="window._openModal(${p.id})">
        <span class="card-id">#${p.id}</span>
        <img class="card-img" src="${p.image}" alt="${displayName}"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.pokedexId}.png'"/>
        <div class="card-name">${displayName}</div>
        <div class="card-pills">
          ${habNom   ? `<span class="pill" title="${habNom}">${habNom}</span>` : ''}
          ${firstMat ? `<span class="pill mat" title="${firstMat}">${firstMat}</span>` : ''}
        </div>
      </div>`;
    }).join('');
    updateProgress();
  }

  function updateProgress() {
    const total = pokemons.length;
    const found = Object.values(progress).filter(Boolean).length;
    const pct   = total ? Math.round(found/total*100) : 0;
    document.getElementById('count').textContent = found;
    document.getElementById('total').textContent = total;
    document.getElementById('pct').textContent   = pct + '%';
    document.getElementById('fill').style.width  = pct + '%';
  }

  // MODAL
  function renderStars(etoiles) {
    return Array.from({length:3}, (_,i) =>
      `<span class="star ${i < etoiles ? 'filled' : 'empty-star'}">★</span>`
    ).join('');
  }

  function renderHabitat(h) {
    if (typeof h === 'string') {
      return `<div class="habitat-card">
        <div class="habitat-header">
          <div class="habitat-thumb-placeholder"></div>
          <div class="habitat-info"><div class="habitat-name">${tHabitat(h)}</div></div>
        </div></div>`;
    }
    const thumb = h.image
      ? `<img class="habitat-thumb" src="${h.image}" alt="${h.nom}" onerror="this.style.display='none'">`
      : `<div class="habitat-thumb-placeholder"></div>`;

    const horH = (h.horaires||[]).map(hr =>
      typeof hr==='object' ? `<img class="meta-icon" src="${hr.icon}" alt="${hr.label}" title="${hr.label}">` : hr
    ).join('');
    const metH = (h.meteo||[]).map(m =>
      typeof m==='object' ? `<img class="meta-icon" src="${m.icon}" alt="${m.label}" title="${m.label}">` : m
    ).join('');
    const rarH = h.rarete
      ? (typeof h.rarete==='object'
        ? `<div class="meta-group"><span class="meta-label">${T[lang].rarity}</span><div class="rarete-stars">${renderStars(h.rarete.etoiles)}</div></div>`
        : `<div class="meta-group"><span class="meta-label">${T[lang].rarity}</span><span>${tRarete(h.rarete)}</span></div>`)
      : '';
    const zonesDisplay = h.zones ? h.zones.split(',').map(z=>tZone(z.trim())).join(', ') : '';
    const zonH = zonesDisplay ? `<div class="meta-group"><span class="meta-label">${T[lang].zone}</span><span class="zone-badge">${zonesDisplay}</span></div>` : '';
    const resH = h.ressources ? `<div class="habitat-ressources"><strong>${T[lang].resources}</strong> ${tRessource(h.ressources)}</div>` : '';
    const metaH = (horH||metH||rarH||zonH) ? `<div class="habitat-meta">
      ${horH ? `<div class="meta-group"><span class="meta-label">${T[lang].schedule}</span>${horH}</div>` : ''}
      ${metH ? `<div class="meta-group"><span class="meta-label">${T[lang].weather}</span>${metH}</div>` : ''}
      ${rarH}${zonH}</div>` : '';

    return `<div class="habitat-card">
      <div class="habitat-header">${thumb}
        <div class="habitat-info"><div class="habitat-name">${tHabitat(h.nom)}</div>${resH}</div>
      </div>${metaH}</div>`;
  }


  // ── MAP SPÉCIALITÉS → ICÔNES ──
  const SPEC_ICONS = {
    'Travaux':         'https://www.pokebip.com/pokedex-images/pokopia/specialites/travaux.png',
    'Expertise':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/expertise.png',
    'Téléportation':   'https://www.pokebip.com/pokedex-images/pokopia/specialites/teleportation.png',
    'Construction':    'https://www.pokebip.com/pokedex-images/pokopia/specialites/construction.png',
    'Broyage':         'https://www.pokebip.com/pokedex-images/pokopia/specialites/broyage.png',
    'Arrosage':        'https://www.pokebip.com/pokedex-images/pokopia/specialites/arrosage.png',
    'Fertilisation':   'https://www.pokebip.com/pokedex-images/pokopia/specialites/fertilisation.png',
    'Combustion':      'https://www.pokebip.com/pokedex-images/pokopia/specialites/combustion.png',
    'Troc':            'https://www.pokebip.com/pokedex-images/pokopia/specialites/troc.png',
    'Désordre':        'https://www.pokebip.com/pokedex-images/pokopia/specialites/desordre.png',
    'Vol':             'https://www.pokebip.com/pokedex-images/pokopia/specialites/vol.png',
    'Recherche':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/recherche.png',
    'Coupe de bois':   'https://www.pokebip.com/pokedex-images/pokopia/specialites/coupe-de-bois.png',
    'Animation':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/animation.png',
    'Électrification': 'https://www.pokebip.com/pokedex-images/pokopia/specialites/electrification.png',
    'Aplanissement':   'https://www.pokebip.com/pokedex-images/pokopia/specialites/aplanissement.png',
    'Rangement':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/rangement.png',
    'Recyclage':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/recyclage.png',
    'Stockage':        'https://www.pokebip.com/pokedex-images/pokopia/specialites/stockage.png',
    'Collection':      'https://www.pokebip.com/pokedex-images/pokopia/specialites/collection.png',
    'Minerai rare':    'https://www.pokebip.com/pokedex-images/pokopia/specialites/minerai-rare.png',
    'Bâillement':      'https://www.pokebip.com/pokedex-images/pokopia/specialites/baillement.png',
    'Récolte de miel': 'https://www.pokebip.com/pokedex-images/pokopia/specialites/recolte-de-miel.png',
    'Île Rêve':        'https://www.pokebip.com/pokedex-images/pokopia/specialites/ile-reve.png',
    'Transformation':  'https://www.pokebip.com/pokedex-images/pokopia/specialites/transformation.png',
    'Luminescence':    'https://www.pokebip.com/pokedex-images/pokopia/specialites/luminescence.png',
    'DJ':              'https://www.pokebip.com/pokedex-images/pokopia/specialites/dj.png',
    'Explosion':       'https://www.pokebip.com/pokedex-images/pokopia/specialites/explosion.png',
    'Peinture':        'https://www.pokebip.com/pokedex-images/pokopia/specialites/peinture.png',
    'Fête':            'https://www.pokebip.com/pokedex-images/pokopia/specialites/fete.png',
    'Gloutonnerie':    'https://www.pokebip.com/pokedex-images/pokopia/specialites/gloutonnerie.png',
  };

  function openModal(id) {
    const p = pokemons.find(pk => pk.id === id);
    if (!p) return;
    modalPokemonId = id;
    document.getElementById('modal-sprite').src = p.image;
    document.getElementById('modal-sprite').onerror = function() {
      this.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.pokedexId}.png`;
    };
    document.getElementById('modal-num').textContent  = `N° ${p.pokedexId}`;
    // Sous-titre langue secondaire
    const altName = lang === 'en' ? p.nom : (p.nom_en || '');
    const subEl = document.getElementById('modal-subname');
    if (subEl) subEl.textContent = altName !== (lang === 'en' ? (p.nom_en || p.nom) : p.nom) ? altName : '';
    const mainName = lang==='en' ? (p.nom_en||p.nom) : p.nom;
    const subName  = lang==='en' ? p.nom : (p.nom_en||'');
    document.getElementById('modal-name').textContent = mainName;
    if (subEl) subEl.textContent = subName !== mainName ? subName : '';
    const mats = p.materiaux || [];
    document.getElementById('modal-mats').innerHTML = mats.length
      ? mats.map(m => {
        const icon = SPEC_ICONS[m];
        const img = icon ? `<img class="mat-badge-icon" src="${icon}" alt="${m}" onerror="this.style.display='none'">` : '';
        return `<span class="mat-badge">${img}${tSpec(m)}</span>`;
      }).join('')
      : `<span style="color:var(--muted);font-size:.85rem;font-weight:700">${T[lang].no_speciality}</span>`;
    const habs = p.habitats || [];
    document.getElementById('modal-habitats').innerHTML = habs.length
      ? habs.map(h => renderHabitat(h)).join('')
      : `<span style="color:var(--muted);font-size:.85rem;font-weight:700">${T[lang].no_habitat}</span>`;
    updateModalFoundState(id);
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function updateModalFoundState(id) {
    const found = !!progress[String(id)];
    document.getElementById('modal-hero').classList.toggle('found-hero', found);
    document.getElementById('btn-found').classList.toggle('is-found', found);
    document.getElementById('btn-found-icon').textContent  = found ? '✓' : '○';
    const tUI=T[lang]; document.getElementById('btn-found-label').textContent = found ? tUI.mark_unfound : tUI.mark_found;
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    modalPokemonId = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('btn-found').addEventListener('click', () => {
    if (modalPokemonId !== null) toggleFound(modalPokemonId);
  });

  let toastTimer;
  function showToast(nom, found) {
    const el = document.getElementById('toast');
    const tT=T[lang]; el.textContent = found ? tT.toast_found(nom) : tT.toast_removed(nom);
    el.className = 'toast show ' + (found ? 'found-toast' : 'unfound-toast');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
  document.getElementById('filter-mat').addEventListener('change', e => { filterMat = e.target.value; render(); });
  document.getElementById('filter-zone').addEventListener('change', e => { filterZone = e.target.value; render(); });
  document.getElementById('filter-habitat').addEventListener('change', e => { filterHabitat = e.target.value; render(); });
  document.querySelectorAll('.btn-filter').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterStatus = btn.dataset.status;
    render();
  }));
  // Langue switch
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      applyLang();
      render();
      // Re-ouvrir la modale si ouverte
      if (modalPokemonId !== null) openModal(modalPokemonId);
    });
  });

  window._openModal = openModal;
</script>
</body>
</html>
