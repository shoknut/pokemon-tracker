<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokopia Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0f1923;
      --surface:   #162030;
      --card:      #1c2d40;
      --card-hover:#223448;
      --border:    #2a3f58;
      --accent:    #ffcb3b;
      --accent2:   #ff6b6b;
      --green:     #4ade80;
      --green-dim: #14532d;
      --text:      #e8f0f8;
      --muted:     #6b8cad;
      --pill-bg:   #1e3350;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(255,203,59,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(74,222,128,0.05) 0%, transparent 60%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      position: relative;
    }
    header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffcb3b 30%, #ff9f43 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    header p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .95rem;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      max-width: 900px;
      margin: .5rem auto 0;
      padding: 0 1.5rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .4rem;
    }
    .progress-meta strong {
      color: var(--accent);
      font-size: 1rem;
    }
    .progress-bar {
      height: 10px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffcb3b, #4ade80);
      border-radius: 99px;
      transition: width .5s ease;
    }

    /* ── CONTROLS ── */
    .controls {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    input[type="search"] {
      width: 100%;
      padding: .6rem 1rem .6rem 2.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    select {
      padding: .6rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    select:focus { border-color: var(--accent); }

    .btn-group {
      display: flex;
      gap: .4rem;
    }
    .btn-filter {
      padding: .55rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-filter.active,
    .btn-filter:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,203,59,.08); }

    /* ── GRID ── */
    .grid {
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem .9rem .85rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      cursor: pointer;
      position: relative;
      transition: transform .18s ease, border-color .18s, background .18s;
      user-select: none;
      animation: fadeIn .3s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      background: var(--card-hover);
      border-color: #3a5570;
      transform: translateY(-2px);
    }
    .card.found {
      border-color: var(--green);
      background: linear-gradient(145deg, #1c2d40 60%, #162a1e);
    }
    .card.found::after {
      content: '✓';
      position: absolute;
      top: .5rem; right: .6rem;
      width: 22px; height: 22px;
      background: var(--green);
      color: #0a2010;
      border-radius: 50%;
      font-size: .75rem;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      line-height: 22px;
      text-align: center;
    }

    .card-img {
      width: 72px; height: 72px;
      image-rendering: pixelated;
      transition: transform .2s;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
    }
    .card:hover .card-img { transform: scale(1.1); }
    .card.found .card-img { filter: drop-shadow(0 2px 8px rgba(74,222,128,.3)); }

    .card-id {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 600;
      position: absolute;
      top: .6rem; left: .7rem;
    }

    .card-name {
      font-size: .9rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }
    .card.found .card-name { color: var(--green); }

    .card-habitats {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      width: 100%;
    }
    .pill {
      font-size: .65rem;
      font-weight: 700;
      padding: .15rem .4rem;
      border-radius: 6px;
      background: var(--pill-bg);
      color: #8aafd4;
      text-align: center;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill.mat {
      background: rgba(255,203,59,.1);
      color: #c8982c;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }
    .empty span { font-size: 3rem; display: block; margin-bottom: .5rem; }

    /* ── FIREBASE STATUS ── */
    .firebase-status {
      position: fixed;
      bottom: 1rem; right: 1rem;
      font-size: .75rem;
      padding: .4rem .8rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all .3s;
      z-index: 100;
    }
    .firebase-status.saving { color: var(--accent); border-color: var(--accent); }
    .firebase-status.saved  { color: var(--green);  border-color: var(--green); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .6rem 1.2rem;
      font-size: .9rem;
      font-weight: 700;
      z-index: 200;
      transition: transform .3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.found-toast  { border-color: var(--green);  color: var(--green); }
    .toast.unfound-toast{ border-color: var(--accent2); color: var(--accent2); }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .7rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌿 Pokopia Tracker</h1>
  <p>Suis ta progression dans ton île Pokémon</p>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Trouvés : <strong id="count">0</strong> / <span id="total">0</span></span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fill" style="width:0%"></div></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input type="search" id="search" placeholder="Chercher un Pokémon…" />
  </div>

  <select id="filter-mat">
    <option value="">Tous les matériaux</option>
  </select>

  <div class="btn-group">
    <button class="btn-filter active" data-status="all">Tous</button>
    <button class="btn-filter" data-status="found">✓ Trouvés</button>
    <button class="btn-filter" data-status="missing">✗ Manquants</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="firebase-status" id="fb-status">💾 Local</div>
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "firebase/app";;
  import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ─────────────────────────────────────────
  // 🔧 REMPLACE PAR TA CONFIG FIREBASE ICI
  // ─────────────────────────────────────────
  const firebaseConfig = {
    apiKey          : "AIzaSyAdAEH70nYgctJ5XG1ZupblZvZiHKucQes",
    authDomain      : "pokopia-6d442.firebaseapp.com",
    projectId       : "pokopia-6d442",
    storageBucket   : "pokopia-6d442.firebasestorage.app",
    messagingSenderId   : "605118786868",
    appId           : "1:605118786868:web:a40b08683b23ba729a4961"
  };
  // ─────────────────────────────────────────

  const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "AIzaSyAdAEH70nYgctJ5XG1ZupblZvZiHKucQes";

  let db = null;
  if (FIREBASE_CONFIGURED) {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  }

  // ── DATA ──
  let pokemons = [];
  let progress = {};  // { "1": true, "25": true, ... }

  // ── STATE ──
  let filterStatus = 'all';
  let filterMat    = '';
  let searchQuery  = '';
  let saveTimer    = null;

  // ── LOAD JSON ──
  async function loadData() {
    const res = await fetch('./pokemon.json');
    pokemons = await res.json();

    // Populate matériaux select
    const allMats = [...new Set(pokemons.flatMap(p => p.materiaux))].sort();
    const sel = document.getElementById('filter-mat');
    allMats.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);
    });

    document.getElementById('total').textContent = pokemons.length;
    await loadProgress();
    render();
  }

  // ── LOAD PROGRESS ──
  async function loadProgress() {
    if (FIREBASE_CONFIGURED && db) {
      try {
        const ref = doc(db, 'pokopia', 'progress');
        const snap = await getDoc(ref);
        if (snap.exists()) progress = snap.data().found || {};
        setStatus('saved');
      } catch (e) {
        console.warn('Firebase load error:', e);
        loadFromLocal();
      }
    } else {
      loadFromLocal();
    }
  }

  function loadFromLocal() {
    try { progress = JSON.parse(localStorage.getItem('pokopia_progress') || '{}'); } catch {}
  }

  // ── SAVE PROGRESS ──
  function saveProgress() {
    localStorage.setItem('pokopia_progress', JSON.stringify(progress));

    if (!FIREBASE_CONFIGURED || !db) return;
    clearTimeout(saveTimer);
    setStatus('saving');
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(doc(db, 'pokopia', 'progress'), { found: progress });
        setStatus('saved');
      } catch (e) {
        console.warn('Firebase save error:', e);
        setStatus('');
      }
    }, 800);
  }

  function setStatus(s) {
    const el = document.getElementById('fb-status');
    el.className = 'firebase-status ' + s;
    if (s === 'saving') el.textContent = '⏳ Sauvegarde…';
    else if (s === 'saved') el.textContent = '☁️ Sauvegardé';
    else el.textContent = FIREBASE_CONFIGURED ? '☁️ Firebase' : '💾 Local';
  }

  // ── TOGGLE FOUND ──
  function toggleFound(id) {
    const key = String(id);
    progress[key] = !progress[key];
    if (!progress[key]) delete progress[key];
    saveProgress();
    updateProgress();
    // re-render only that card
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      const found = !!progress[key];
      card.classList.toggle('found', found);
      showToast(card.querySelector('.card-name').textContent, found);
      // hide if filter doesn't match
      if (filterStatus === 'found' && !found) card.style.display = 'none';
      if (filterStatus === 'missing' && found) card.style.display = 'none';
    }
  }

  // ── RENDER ──
  function render() {
    const grid = document.getElementById('grid');
    const q = searchQuery.toLowerCase();

    const filtered = pokemons.filter(p => {
      if (q && !p.nom.toLowerCase().includes(q)) return false;
      if (filterMat && !p.materiaux.includes(filterMat)) return false;
      const found = !!progress[String(p.id)];
      if (filterStatus === 'found'   && !found) return false;
      if (filterStatus === 'missing' &&  found) return false;
      return true;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><span>🔍</span>Aucun Pokémon trouvé…</div>`;
      updateProgress();
      return;
    }

    grid.innerHTML = filtered.map((p, i) => {
      const found = !!progress[String(p.id)];
      const habDisplay = p.habitats.slice(0, 2).map(h =>
        `<span class="pill" title="${h}">${h}</span>`
      ).join('');
      const matDisplay = p.materiaux.slice(0, 2).map(m =>
        `<span class="pill mat" title="${m}">${m}</span>`
      ).join('');

      return `
        <div class="card ${found ? 'found' : ''}" data-id="${p.id}"
             style="animation-delay:${Math.min(i * 20, 400)}ms"
             onclick="window._toggle(${p.id})">
          <span class="card-id">#${p.id}</span>
          <img class="card-img"
               src="${p.image}"
               alt="${p.nom}"
               onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.pokedexId}.png'" />
          <div class="card-name">${p.nom}</div>
          <div class="card-habitats">${habDisplay}${matDisplay}</div>
        </div>`;
    }).join('');

    updateProgress();
  }

  function updateProgress() {
    const total = pokemons.length;
    const found = Object.values(progress).filter(Boolean).length;
    const pct = total ? Math.round(found / total * 100) : 0;
    document.getElementById('count').textContent = found;
    document.getElementById('total').textContent = total;
    document.getElementById('pct').textContent = pct + '%';
    document.getElementById('fill').style.width = pct + '%';
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(nom, found) {
    const el = document.getElementById('toast');
    el.textContent = found ? `✅ ${nom} trouvé !` : `❌ ${nom} retiré`;
    el.className = 'toast show ' + (found ? 'found-toast' : 'unfound-toast');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── EVENTS ──
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  document.getElementById('filter-mat').addEventListener('change', e => {
    filterMat = e.target.value;
    render();
  });

  document.querySelectorAll('.btn-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterStatus = btn.dataset.status;
      render();
    });
  });

  // Expose toggle globally (called from onclick in dynamic HTML)
  window._toggle = toggleFound;

  // ── INIT ──
  loadData();
</script>
</body>
</html>
